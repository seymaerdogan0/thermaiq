<div class="page p-6" id="page-calendar">
      <div class="grid grid-cols-3 gap-5">
        <div class="col-span-2 rounded-xl p-5" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)">
          <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
            <div>
              <p class="text-sm font-semibold text-white" id="cal-title">Kritik Trafik Takvimi</p>
              <p class="text-xs text-slate-600 mt-1" id="cal-subtitle">Ay ve yıl seçerek kritik günleri gezebilirsiniz.</p>
            </div>
            <div class="flex flex-wrap items-center gap-2">
              <button onclick="changeCalendarMonth(-1)" class="w-8 h-8 rounded-lg border border-white/10 text-slate-400 hover:text-white hover:border-blue-500/40" title="Önceki ay">
                <i class="fas fa-chevron-left text-xs"></i>
              </button>
              <select class="form-input px-2 py-2 rounded-lg text-xs font-semibold" id="calendar-month-select" onchange="setCalendarMonthYear()">
                <option value="0">Ocak</option>
                <option value="1">Şubat</option>
                <option value="2">Mart</option>
                <option value="3">Nisan</option>
                <option value="4">Mayıs</option>
                <option value="5">Haziran</option>
                <option value="6">Temmuz</option>
                <option value="7">Ağustos</option>
                <option value="8">Eylül</option>
                <option value="9">Ekim</option>
                <option value="10">Kasım</option>
                <option value="11">Aralık</option>
              </select>
              <input class="form-input w-20 px-2 py-2 rounded-lg text-xs font-semibold mono" id="calendar-year-input" type="text" inputmode="numeric" pattern="[0-9]*" value="2026" oninput="handleCalendarYearInput()" onchange="setCalendarMonthYear()">
              <button onclick="goToTodayCalendar()" class="px-3 py-2 rounded-lg text-xs font-semibold text-slate-400 border border-white/10 hover:text-white hover:border-blue-500/40">Bugün</button>
              <button onclick="changeCalendarMonth(1)" class="w-8 h-8 rounded-lg border border-white/10 text-slate-400 hover:text-white hover:border-blue-500/40" title="Sonraki ay">
                <i class="fas fa-chevron-right text-xs"></i>
              </button>
              <span class="chip bg-red-500/10 text-red-400 border border-red-500/20" id="cal-count">0 Kritik Gün</span>
            </div>
          </div>
          <div class="grid grid-cols-7 gap-1 mb-1">
            <div class="text-center text-xs text-slate-600 font-medium py-1">Pt</div>
            <div class="text-center text-xs text-slate-600 font-medium py-1">Sa</div>
            <div class="text-center text-xs text-slate-600 font-medium py-1">Ça</div>
            <div class="text-center text-xs text-slate-600 font-medium py-1">Pe</div>
            <div class="text-center text-xs text-slate-600 font-medium py-1">Cu</div>
            <div class="text-center text-xs text-slate-600 font-medium py-1">Ct</div>
            <div class="text-center text-xs text-slate-600 font-medium py-1">Pz</div>
          </div>
          <div class="grid grid-cols-7 gap-1" id="cal-grid"></div>
          <div class="mt-4 rounded-xl p-4 border border-white/10" style="background:rgba(255,255,255,0.025)">
            <div class="flex flex-wrap items-center gap-3">
              <select class="form-input px-3 py-2 rounded-lg text-xs font-semibold" id="calendar-upload-kind">
                <option value="events">Önemli tarihler (backend)</option>
                <option value="weather">Sıcaklık verisi</option>
                <option value="traffic">Trafik/yük verisi</option>
                <option value="operations">Operasyon/sensör verisi</option>
              </select>
              <input id="calendar-file-input" type="file" accept=".csv,.json,.txt,.tsv,.md,text/*,application/json" class="hidden" onchange="uploadCalendarFile(this.files[0])">
              <button onclick="document.getElementById('calendar-file-input').click()" class="btn-primary px-4 py-2 rounded-lg text-xs font-semibold text-white">
                <i class="fas fa-file-upload mr-2"></i>Dosya Yükle
              </button>
              <button onclick="downloadCalendarSample()" class="px-4 py-2 rounded-lg text-xs font-semibold text-slate-400 border border-white/10 hover:text-white hover:border-blue-500/40">
                Şablon İndir
              </button>
            </div>
            <div id="calendar-upload-status" class="hidden mt-3 text-xs rounded-lg border p-3"></div>
          </div>
          <div class="mt-4 rounded-xl p-4 border border-blue-500/20" id="cal-detail-card" style="background:rgba(70,83,106,0.06)">
            <div class="text-center py-6 text-xs text-slate-500 font-medium">Detay için takvimde bir güne tıklayın.</div>
          </div>
          <div class="mt-4">
            <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-2">Kayıtlı Etkinlikler</p>
            <div id="cal-events-list" class="space-y-1.5"></div>
          </div>
        </div>
        <div class="rounded-xl p-5" style="background:rgba(0,51,160,0.08);border:1px solid rgba(0,51,160,0.2)">
          <p class="text-sm font-semibold text-white mb-4"><i class="fas fa-plus-circle mr-2 text-blue-400"></i>Kritik Gün Ekle</p>
          <div class="space-y-3">
            <div>
              <label class="text-xs text-slate-500 font-medium block mb-1">Etkinlik / Pik Adı</label>
              <input class="form-input w-full px-3 py-2 rounded-lg text-sm" type="text" id="ev-name" placeholder="Örn: KPSS Açıklanması">
            </div>
            <div>
              <label class="text-xs text-slate-500 font-medium block mb-1">Tarih</label>
              <input class="form-input w-full px-3 py-2 rounded-lg text-sm" type="date" id="ev-date" value="2026-06-15">
            </div>
            <div>
              <label class="text-xs text-slate-500 font-medium block mb-1">Beklenen Yük Oranı (%)</label>
              <input class="form-input w-full px-3 py-2 rounded-lg text-sm" type="number" id="ev-load" min="0" max="100" placeholder="85">
            </div>
            <div>
              <label class="text-xs text-slate-500 font-medium block mb-1">Önem Seviyesi</label>
              <select class="form-input w-full px-3 py-2 rounded-lg text-sm" id="ev-severity">
                <option value="critical">🔴 Kritik</option>
                <option value="normal">🟡 Normal</option>
              </select>
            </div>
            <div>
              <label class="text-xs text-slate-500 font-medium block mb-1">Açıklama</label>
              <textarea class="form-input w-full px-3 py-2 rounded-lg text-sm resize-none" rows="3" id="ev-desc" placeholder="e-Devlet trafik spike'ı bekleniyor..."></textarea>
            </div>
            <button onclick="addCalendarEvent()" class="btn-primary w-full py-2.5 rounded-lg text-sm font-semibold text-white">
              <i class="fas fa-save mr-2"></i>Kaydet & Takvime Ekle
            </button>
            <div id="cal-success" class="hidden text-xs text-green-400 text-center mt-1"><i class="fas fa-check-circle mr-1"></i>Kaydedildi</div>
          </div>
        </div>
      </div>
    </div>
